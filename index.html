<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Random User</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Generate Random User</h1>
        <div id="user">
            
        </div>
        <button>
            Generate User
        </button>
        
    </div>

    <script>
        let user = document.getElementById('user');

        async function generateUser(){
            try{
                let response = await fetch('https://randomuser.me/api/');
                let data = await response.json();
                let userData = data.results[0];
                user.innerHTML = `
                    <p>Name: ${userData.name.first} ${userData.name.last}</p>
                    <p>Email: ${userData.email}</p>
                    <p>Location: ${userData.location.city}, ${userData.location.country}</p>
                    <p>Phone: ${userData.phone}</p>
                    <p>passport No: ${userData.id.value}</p>
                    <img src="${userData.picture.large}" alt="User Picture">
                `;
            } 
            catch (error) {
                alert('Failed to fetch user data. Please try again.');
            }
        }

        document.querySelector('button').addEventListener('click', generateUser);
    </script>
</body>
</html>
